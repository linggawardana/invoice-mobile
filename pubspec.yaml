name: alkesmamed_mobile
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  pdf: ^3.10.0
  printing: ^5.11.0
  path_provider: ^2.1.1
  intl: ^0.18.1
  http: ^1.1.0        # Untuk menembak API Laravel
  sqflite: ^2.3.0     # Database lokal (Offline Mode)
  shared_preferences: ^2.2.0 # Untuk simpan token login

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo_mig.png
    - assets/images/logo_google.png